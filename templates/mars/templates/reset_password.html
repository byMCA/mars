{% extends "layout.html" %}

{% block content %}
<div class="relative min-h-[calc(100vh-80px)] flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 opacity-40 bg-[conic-gradient(from_220deg_at_50%_50%,rgba(0,240,255,0.05),transparent,rgba(224,60,49,0.08))]"></div>
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-mars-red/20 blur-[200px] pointer-events-none"></div>

    <div class="relative z-10 w-full max-w-lg px-4">
        <div class="glass-panel p-10 rounded-sm border border-white/10 shadow-[0_50px_140px_rgba(0,0,0,0.7)]">
            <div class="mb-10">
                <p class="text-[10px] text-mars-cyan font-mono tracking-[0.4em] uppercase">Security Layer</p>
                <h2 class="text-2xl font-bold text-white tracking-[0.2em] uppercase">Reset Credentials</h2>
                <p class="text-xs text-gray-400 mt-2 font-mono">Token doğrulandı. Yeni erişim anahtarınızı belirleyin.</p>
            </div>

            <form action="{{ url_for('reset_password', token=token) }}" method="POST" class="space-y-6">
                <div>
                    <label class="block text-[10px] text-gray-500 mb-1 font-mono uppercase tracking-widest">New Access Key</label>
                    <input type="password" name="new_password" minlength="6" required placeholder="••••••••" class="w-full bg-black/30 border border-white/10 focus:border-mars-red/60 transition-colors rounded-sm px-4 py-3 text-sm text-white placeholder-gray-500 font-mono tracking-widest">
                </div>
                <div>
                    <label class="block text-[10px] text-gray-500 mb-1 font-mono uppercase tracking-widest">Confirm Access Key</label>
                    <input type="password" name="confirm_password" minlength="6" required placeholder="••••••••" class="w-full bg-black/30 border border-white/10 focus:border-mars-cyan/60 transition-colors rounded-sm px-4 py-3 text-sm text-white placeholder-gray-500 font-mono tracking-widest">
                </div>

                <button type="submit" class="w-full bg-white/10 hover:bg-white/20 text-white font-bold tracking-[0.3em] text-xs uppercase py-4 border border-white/10 transition-all duration-300">
                    Update Credentials
                </button>
            </form>

            <div class="mt-10 text-center">
                <a href="{{ url_for('login') }}" class="text-[10px] font-mono text-gray-500 hover:text-white transition-colors">Return to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
